# ── nginx.conf — Port 8080 pour Koyeb ─────────────────────────────────────
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip pour de meilleures perfs
    gzip on;
    gzip_types text/html text/css application/javascript;

    # Cache navigateur sur les assets statiques
    location ~* \.(html|css|js)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # Toutes les routes renvoient index.html (SPA-ready)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
